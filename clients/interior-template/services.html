<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Services | {{studio_name}}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{charcoal:'#1C1C1E',gold:'#C9A84C',sage:'#7D9B76',cream:'#FAFAF8'},fontFamily:{display:['"Cormorant Garamond"','serif'],body:['Jost','sans-serif']}}}}</script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="../../client.js"></script>
</head>
<body class="font-body bg-cream text-charcoal">

<!-- Nav -->
<nav id="header" class="fixed w-full z-50 bg-[#FAFAF8]/90 backdrop-blur-md py-4 px-6 md:px-12 flex justify-between items-center text-charcoal border-b border-charcoal/10">
  <a href="index.html" class="flex flex-col">
    <span class="text-3xl font-display font-bold text-gold" data-c="logo_letter">A</span>
    <span class="text-[10px] tracking-widest uppercase text-charcoal" data-c="studio_name">Studio</span>
  </a>
  <div class="hidden md:flex space-x-8 text-xs tracking-widest uppercase items-center">
    <a href="index.html" class="hover:text-gold transition">Home</a>
    <a href="portfolio.html" class="hover:text-gold transition">Portfolio</a>
    <a href="services.html" class="text-gold">Services</a>
    <a href="about.html" class="hover:text-gold transition">About</a>
    <a href="contact.html" class="bg-gold text-white px-6 py-2.5 rounded-full font-bold shadow-lg hover:bg-charcoal transition">Book Consultation</a>
  </div>
  <button onclick="document.getElementById('mob-menu').classList.toggle('hidden')" class="md:hidden">
    <svg width="24" height="24" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
</nav>

<div id="mob-menu" class="fixed inset-0 bg-cream z-[60] hidden flex flex-col items-center justify-center space-y-6 text-xl uppercase font-display">
  <button onclick="document.getElementById('mob-menu').classList.toggle('hidden')" class="absolute top-6 right-6">
    <svg width="24" height="24" stroke="currentColor"><path d="M6 18L18 6M6 6l12 12"/></svg>
  </button>
  <a href="index.html">Home</a><a href="portfolio.html">Portfolio</a><a href="services.html" class="text-gold">Services</a><a href="about.html">About</a><a href="contact.html">Book Consultation</a>
</div>

<!-- Hero -->
<main class="relative pt-32 pb-12 flex flex-col md:flex-row items-center px-6 md:px-12 gap-12 max-w-[1440px] mx-auto overflow-hidden">
  <div class="w-full md:w-1/2 flex flex-col justify-center gap-6 md:pr-8 z-10 order-2 md:order-1 fade-up">
    <div class="flex items-center gap-3 text-gold text-[12px] font-semibold tracking-[0.2em] uppercase">
      <span class="w-8 h-[1px] bg-gold"></span>What We Do
    </div>
    <h1 class="font-display text-[4rem] md:text-[5.5rem] leading-[1.05] font-light text-charcoal">Our Services</h1>
    <p class="text-lg text-charcoal/70 max-w-md leading-relaxed">Comprehensive solutions tailored for your needs.</p>
  </div>
  <div class="w-full md:w-1/2 relative h-[300px] md:h-[500px] order-1 md:order-2 fade-up">
    <div class="absolute inset-0 bg-[#F2F2F0] rounded-tl-[120px] rounded-br-[120px] overflow-hidden shadow-2xl">
      <img data-c-src="hero_image" src="https://images.unsplash.com/photo-1600607686527-6fb886090705?auto=format&fit=crop&w=1200&q=80" class="w-full h-full object-cover grayscale-[20%] hover:grayscale-0 transition-all duration-700" alt="Services">
    </div>
  </div>
</main>

<!-- Services Grid (dynamic) -->
<section class="py-20 max-w-7xl mx-auto px-6">
  <h2 class="font-display text-4xl text-center mb-12 fade-up">Everything We Offer</h2>
  <div id="services-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
    <!-- Populated by JS -->
  </div>
</section>

<!-- CTA -->
<section class="py-20 bg-charcoal text-white px-6 text-center">
  <h2 class="font-display text-4xl mb-4">Ready to Begin?</h2>
  <p class="text-white/60 mb-8">Let's talk about your project.</p>
  <a href="contact.html" class="inline-block bg-gold text-charcoal px-10 py-4 text-sm uppercase tracking-widest font-bold hover:bg-yellow-600 transition">Book a Consultation →</a>
</section>

<!-- Footer -->
<footer class="bg-charcoal text-white py-8 px-6 border-t border-white/10">
  <div class="max-w-7xl mx-auto text-xs text-white/40 text-center tracking-widest">
    &copy; 2025 <span data-c="studio_name">Studio</span>. <span data-c="footer_credit"></span>
  </div>
</footer>

<!-- WhatsApp Float -->
<a data-c-href="whatsapp_link" href="#" class="fixed bottom-6 right-6 w-14 h-14 bg-[#25d366] text-white rounded-full flex justify-center items-center shadow-lg hover:scale-110 transition z-[999]">
  <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.888-.788-1.489-1.761-1.663-2.06-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<script>
window.addEventListener('scroll',()=>{let h=document.getElementById('header');if(window.scrollY>50)h.classList.add('shadow-md');else h.classList.remove('shadow-md');});
const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting){x.target.classList.remove('opacity-0','translate-y-5');x.target.classList.add('opacity-100','translate-y-0');}});});
document.querySelectorAll('.fade-up').forEach(el=>{el.classList.add('opacity-0','translate-y-5','transition-all','duration-700','ease-out');obs.observe(el);});

window.addEventListener('DOMContentLoaded', async () => {
  await new Promise(r => setTimeout(r, 600));
  const c = window.__client;
  if (!c) return;

  const services = c.services || [];
  const grid = document.getElementById('services-grid');
  grid.innerHTML = services.map(s => `
    <div class="p-8 bg-white border border-gray-100 rounded-2xl hover:shadow-xl transition fade-up">
      <h3 class="font-display text-2xl mb-3 text-charcoal">${s.title}</h3>
      <p class="text-sm text-charcoal/60 leading-relaxed mb-4">${s.description}</p>
      ${s.price ? `<p class="text-gold font-semibold text-sm">${s.price}</p>` : ''}
      <a href="contact.html" class="inline-block mt-4 text-xs uppercase tracking-widest hover:text-gold border-b border-charcoal hover:border-gold transition">Book This →</a>
    </div>
  `).join('');

  document.querySelectorAll('.fade-up').forEach(el=>{el.classList.add('opacity-0','translate-y-5','transition-all','duration-700','ease-out');obs.observe(el);});
});
</script>
</body>
</html>
