<script>
document.addEventListener("DOMContentLoaded", () => {
    document.title = `${CLIENT.studio_name} | Interior Designer`;
    
    const bindElements = {
        "nav-logo": CLIENT.logo_letter,
        "nav-title": CLIENT.studio_name,
        "footer-credit": CLIENT.footer_credit,
        "footer-addr1": CLIENT.address_line1,
        "footer-addr2": CLIENT.address_line2,
        "footer-phone": CLIENT.phone,
        "footer-email": CLIENT.email,
        "tagline": CLIENT.tagline
    };
    for (const [id, value] of Object.entries(bindElements)) {
        document.querySelectorAll(`[data-bind="${id}"]`).forEach(el => el.textContent = value);
    }
    
    const waLink = `https://wa.me/${CLIENT.whatsapp_number}?text=${encodeURIComponent(CLIENT.whatsapp_message)}`;
    document.querySelectorAll('[data-link="whatsapp"]').forEach(el => el.href = waLink);

    const btn = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-menu');
    if (btn && menu) btn.addEventListener('click', () => menu.classList.toggle('hidden'));

    const yr = document.getElementById('current-year');
    if(yr) yr.textContent = new Date().getFullYear();

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

    const sc = document.getElementById('services-page-container');
    if (sc) {
        CLIENT.services.forEach((svc, idx) => {
            sc.innerHTML += `
                <div class="bg-white p-6 border border-charcoal/10 fade-up" style="transition-delay: ${idx*100}ms">
                    <strong class="block text-charcoal text-[18px] mb-2 flex items-center gap-3"><span class="text-2xl">${svc.icon}</span> ${svc.title}</strong>
                    <p class="text-[14px] opacity-70 mb-4">${svc.description}</p>
                    <p class="text-[10px] text-gold font-bold uppercase tracking-widest mb-6">${svc.price}</p>
                    <a data-link="whatsapp" target="_blank" class="inline-block bg-[#25D366] text-white px-4 py-2 text-[10px] uppercase font-bold tracking-widest rounded transition hover:bg-[#20bd5a]">Inquire</a>
                </div>
            `;
        });
        sc.querySelectorAll('[data-link="whatsapp"]').forEach(el => el.href = waLink);
    }
});
</script>
